<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --accent: #10b981; --bg: #030303; --text: #f0f0f0; --neon: 0 0 10px rgba(59, 130, 246, 0.5), 0 0 20px rgba(59, 130, 246, 0.3); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        body::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-image: linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -2; 
        }

        .page-transition { animation: pageFade 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes pageFade { from { opacity: 0; transform: translateY(15px); filter: blur(5px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
        
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 12px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; }
        .glass::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(to bottom right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%); transform: rotate(45deg); transition: 0.5s; opacity: 0; }
        .glass:hover { border-color: var(--primary); transform: translateY(-8px); box-shadow: var(--neon); }
        .glass:hover::after { opacity: 1; left: 100%; }

        /* --- 新增：打字機動畫 --- */
        .typing-container { display: inline-block; max-width: 100%; }
        .typing {
            overflow: hidden; border-right: .15em solid var(--accent);
            white-space: nowrap; margin: 0 auto; letter-spacing: .05em;
            animation: typing 2.5s steps(40, end), blink-caret .75s step-end infinite;
        }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--accent); } }

        /* --- 新增：導覽列 RWD 響應式佈局 --- */
        .desktop-nav { display: flex; gap: 30px; align-items: center; }
        .mobile-btn { display: none; background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; z-index: 1001; }
        
        @media (max-width: 768px) {
            .desktop-nav { display: none; }
            .mobile-btn { display: block; }
        }

        /* 彈出視窗 (Modal) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; animation: fadeIn 0.3s forwards; }
        .modal-content { max-width: 90vw; max-height: 90vh; border: 2px solid var(--primary); box-shadow: 0 0 30px rgba(59, 130, 246, 0.4); border-radius: 8px; position: relative; transform: scale(0.9); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .modal-close { position: absolute; top: -20px; right: -20px; width: 40px; height: 40px; background: var(--primary); color: #fff; border: none; border-radius: 50%; font-size: 1.5rem; cursor: pointer; font-weight: bold; box-shadow: var(--neon); }
        @keyframes fadeIn { to { opacity: 1; } } @keyframes popIn { to { transform: scale(1); } }
    </style>
