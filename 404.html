        * { margin: 0; padding: 0; box-sizing: border-box; }

        body::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-image: linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -2; 
        }

        /* 修正標題溢出：動態縮放與換行 */
        h2 {
            font-size: clamp(1.8rem, 8vw, 3.5rem);

            overflow-wrap: break-word;
            word-break: break-word;
            line-height: 1.1;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .page-transition { animation: pageFade 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes pageFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 12px; transition: 0.3s; }
        .glass:hover { border-color: var(--primary); box-shadow: var(--neon); }

        .desktop-nav { display: flex; gap: 25px; align-items: center; }
        .mobile-btn { display: none; background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; z-index: 1001; }
        
        @media (max-width: 850px) {
            .desktop-nav { display: none; }
            .mobile-btn { display: block; }
        }

        .typing { overflow: hidden; border-right: .15em solid var(--accent); white-space: nowrap; animation: typing 2.5s steps(40, end), blink-caret .75s step-end infinite; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--accent); } }
