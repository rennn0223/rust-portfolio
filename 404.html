    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --accent: #10b981; --bg: #030303; --text: #f0f0f0; --neon: 0 0 10px rgba(59, 130, 246, 0.4); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        body::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-image: linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -2; 
        }

        h2 { font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 900; letter-spacing: -2px; overflow-wrap: break-word; word-break: break-word; line-height: 1.1; margin-bottom: 50px; text-transform: uppercase; text-align: center; }

        .page-transition { animation: pageFade 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        /* 終極修復：結尾使用 transform: none; 釋放 Modal 的定位限制 */
        @keyframes pageFade { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: none; filter: none; } 
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 12px; transition: 0.3s; }
        .glass:hover { border-color: var(--primary); box-shadow: var(--neon); transform: translateY(-5px); }

        .desktop-nav { display: flex; gap: 25px; align-items: center; }
        .mobile-btn { display: none; background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; z-index: 1001; }
        @media (max-width: 850px) { .desktop-nav { display: none; } .mobile-btn { display: block; } }

        .typing-container { display: flex; justify-content: center; width: 100%; }
        .typing { display: inline-block; overflow: hidden; white-space: nowrap; border-right: 3px solid var(--accent); max-width: 0; animation: typing 2s steps(40, end) 0.5s forwards, blink-caret .75s step-end infinite; }
        @keyframes typing { from { max-width: 0; } to { max-width: 100vw; } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--accent); } }

        /* Modal 修復為嚴格鎖定螢幕 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 99999; opacity: 0; animation: fadeIn 0.3s forwards; }
        .modal-content { max-width: 95vw; max-height: 90vh; border: 2px solid var(--primary); box-shadow: 0 0 30px rgba(59, 130, 246, 0.4); border-radius: 8px; position: relative; transform: scale(0.9); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .modal-close { position: absolute; top: -15px; right: -15px; width: 35px; height: 35px; background: var(--primary); color: #fff; border: none; border-radius: 50%; font-size: 1.2rem; cursor: pointer; font-weight: bold; box-shadow: var(--neon); display: flex; justify-content: center; align-items: center; }
        @keyframes fadeIn { to { opacity: 1; } } @keyframes popIn { to { transform: scale(1); } }
    </style>
