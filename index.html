<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIN, SHU-JEN | Systems Architect</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --accent: #10b981; --bg: #030303; --text: #f0f0f0; --neon: 0 0 10px rgba(59, 130, 246, 0.4); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        body::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-image: linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -2; 
        }

        /* 修正標題溢出：動態縮放與換行 */
        h2 {
            font-size: clamp(1.8rem, 8vw, 3.5rem);
            font-weight: 900;
            letter-spacing: -2px;
            overflow-wrap: break-word;
            word-break: break-word;
            line-height: 1.1;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .page-transition { animation: pageFade 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes pageFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 12px; transition: 0.3s; }
        .glass:hover { border-color: var(--primary); box-shadow: var(--neon); }

        .desktop-nav { display: flex; gap: 25px; align-items: center; }
        .mobile-btn { display: none; background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; z-index: 1001; }
        
        @media (max-width: 850px) {
            .desktop-nav { display: none; }
            .mobile-btn { display: block; }
        }

        ./* --- 修正版打字機動畫 --- */
        .typing-container {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        .typing {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid var(--accent);
            max-width: 0; /* 起始狀態隱藏 */
            /* 延遲 0.5 秒開始，打字 2 秒，保持最後狀態 forwards */
            animation: typing 2s steps(40, end) 0.5s forwards, blink-caret .75s step-end infinite;
        }
        @keyframes typing {
            from { max-width: 0; }
            to { max-width: 100vw; } /* 展開到最大內容寬度 */
        }
        @keyframes blink-caret { 
            from, to { border-color: transparent } 
            50% { border-color: var(--accent); } 
        }
    </style>
