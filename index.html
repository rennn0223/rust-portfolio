<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHU-JEN LIN | Systems Architect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --accent: #10b981; --bg: #050505; --card-bg: rgba(20, 20, 20, 0.7); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }

        /* 炫技 1: 科技感網格背景 */
        body::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-image: linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -2; 
        }

        /* 炫技 2: 動態藍色光暈 */
        body::after {
            content: ""; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.03) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }

        /* 掃描線動畫 */
        @keyframes scan { from { transform: translateY(-100%); } to { transform: translateY(100%); } }
        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(59, 130, 246, 0.05), transparent);
            animation: scan 8s linear infinite; pointer-events: none; z-index: 1000;
        }

        /* 通用動畫 */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .reveal { animation: fadeInUp 0.8s ease-out forwards; }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 24px; }
        
        /* 玻璃擬態卡片 */
        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px;
            padding: 30px; transition: all 0.3s ease;
        }
        .glass-card:hover { border-color: var(--primary); box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); transform: translateY(-5px); }

        /* 響應式調整 */
        @media (max-width: 768px) { .section-title { font-size: 1.8rem; } }
    </style>
</head>
<body>
    <div class="scanline"></div>
</body>
</html>
