<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHU-JEN LIN | Systems Architect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --accent: #10b981; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }
        
        /* 炫技 1: 背景掃描網格 */
        body::before { 
            content: ""; position: fixed; width: 100vw; height: 100vh; 
            background-image: radial-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 1px); 
            background-size: 30px 30px; z-index: -1; 
        }

        /* 炫技 2: CRT 掃描線特效 (Overlay) */
        body::after {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* 動畫類別 */
        @keyframes title-glow {
            from { text-shadow: 0 0 10px rgba(59, 130, 246, 0); transform: translateY(20px); opacity: 0; }
            to { text-shadow: 0 0 20px rgba(59, 130, 246, 0.6); transform: translateY(0); opacity: 1; }
        }
        .animate-in { animation: title-glow 1.2s ease-out forwards; }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 24px; }
        .section-title { font-size: 2.5rem; font-weight: 900; margin-bottom: 50px; border-left: 5px solid var(--primary); padding-left: 15px; }

        @media (max-width: 768px) {
            .section-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body></body>
</html>
